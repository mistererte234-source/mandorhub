services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test}
      POSTGRES_DB: ${POSTGRES_DB:-mandorhub}
    volumes:
      # initdb hanya jalan saat volume kosong. Reset: docker compose down -v
      - ./db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/seeds/dev_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - mh_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-mandorhub}"]
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-test}@db:5432/${POSTGRES_DB:-mandorhub}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      OTP_DEV_MODE: "true"
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  mh_pgdata:
