<body class="bg-surface font-body-md text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="max-w-md mx-auto relative min-h-screen pb-32">
<!-- Transactional Header (Replacing TopAppBar for focused flow) -->
<header class="sticky top-0 z-40 bg-surface/90 backdrop-blur-md px-container-margin py-md flex items-center justify-between border-b border-surface-variant">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'wght' 600;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Laporan Harian</h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Progress Indicator -->
<div class="px-container-margin py-base flex gap-2">
<div class="h-2 flex-1 bg-primary rounded-full"></div>
<div class="h-2 flex-1 bg-primary/30 rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-highest rounded-full"></div>
<div class="h-2 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<main class="px-container-margin py-md flex flex-col gap-lg">
<!-- Step 1: Foto -->
<section class="bg-surface-container-lowest rounded-2xl p-md card-shadow flex flex-col gap-md">
<div class="border-b border-surface-variant pb-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">1. Foto Kondisi Hari Ini</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Wajib lampirkan minimal 1 foto area kerja.</p>
</div>
<button class="touch-target w-full rounded-xl bg-secondary-fixed text-on-secondary-fixed flex items-center justify-center gap-sm active:scale-95 transition-transform border border-secondary-fixed-dim">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
<span class="font-label-lg text-label-lg">Ambil Foto</span>
</button>
<!-- Photo Preview Grid -->
<div class="grid grid-cols-3 gap-sm mt-xs">
<!-- Preview 1 -->
<div class="relative aspect-square rounded-xl overflow-hidden shadow-sm border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A detailed, bright photograph of a construction site foundation under clear daylight, showing freshly poured concrete and steel rebar structures, captured from a clear, pragmatic angle suitable for an inspection report." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAmoiTQ9gUCwnPBYBaKXdPYQ3q-SF3bet-mXRu17fsQXZ99mam3U7ZE6vLEUVjvt_zki3SLId4RkCB3ODvfGAYLZ1YCjPeiZ0b-pUKytKLPzB9YHGEY0P30zDwQlQe2ngLanO5D7DGJgS2I96gaRzr5hyyHQz4eNprcWMAYmBpU5qjjCuoyylJPVzGuXCIiUCaEHSJZ5USH2KMP6azy4x56dCd2lk0Gl-affvBuHelb67AQZk3yBZaLks4mhGdVI8pXXhnRGLIVJo"/>
<button class="absolute top-1 right-1 w-8 h-8 bg-surface-container-lowest/80 backdrop-blur-sm rounded-full flex items-center justify-center text-error">
<span class="material-symbols-outlined" style="font-size: 20px;">close</span>
</button>
</div>
</div>
</section>
<!-- Step 2: Pekerja -->
<section class="bg-surface-container-lowest rounded-2xl p-md card-shadow flex flex-col gap-md">
<div class="border-b border-surface-variant pb-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">2. Berapa pekerja yang hadir?</h2>
</div>
<div class="grid grid-cols-2 gap-sm">
<!-- Unselected -->
<button class="touch-target rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-headline-md text-headline-md flex flex-col items-center justify-center active:scale-95 transition-all">
                        1–5
                    </button>
<!-- Unselected -->
<button class="touch-target rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-headline-md text-headline-md flex flex-col items-center justify-center active:scale-95 transition-all">
                        6–10
                    </button>
<!-- Selected -->
<button class="touch-target rounded-xl border-2 border-primary bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md flex flex-col items-center justify-center active:scale-95 transition-all ring-2 ring-primary ring-offset-2 ring-offset-surface-container-lowest">
                        11–20
                    </button>
<!-- Unselected -->
<button class="touch-target rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-headline-md text-headline-md flex flex-col items-center justify-center active:scale-95 transition-all">
                        &gt;20
                    </button>
</div>
</section>
<!-- Step 3: Pekerjaan -->
<section class="bg-surface-container-lowest rounded-2xl p-md card-shadow flex flex-col gap-md">
<div class="border-b border-surface-variant pb-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">3. Apa pekerjaan hari ini?</h2>
</div>
<div class="flex flex-wrap gap-sm">
<!-- Selected -->
<button class="touch-target px-4 rounded-xl border-2 border-primary bg-primary-fixed text-on-primary-fixed font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_box</span>
                        Pasang Bata
                    </button>
<!-- Selected -->
<button class="touch-target px-4 rounded-xl border-2 border-primary bg-primary-fixed text-on-primary-fixed font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_box</span>
                        Cor Beton
                    </button>
<!-- Unselected -->
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">check_box_outline_blank</span>
                        Plester
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">check_box_outline_blank</span>
                        Keramik
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">check_box_outline_blank</span>
                        Atap
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">check_box_outline_blank</span>
                        Listrik
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined">add</span>
                        Lainnya
                    </button>
</div>
</section>
<!-- Step 4: Target -->
<section class="bg-surface-container-lowest rounded-2xl p-md card-shadow flex flex-col gap-md">
<div class="border-b border-surface-variant pb-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">4. Target hari ini tercapai?</h2>
</div>
<div class="flex flex-col gap-sm">
<!-- Selected -->
<button class="touch-target w-full rounded-xl border-2 border-primary bg-primary-fixed text-on-primary-fixed font-headline-md text-headline-md flex items-center justify-between px-md active:scale-95 transition-all ring-2 ring-primary ring-offset-2 ring-offset-surface-container-lowest">
<span>Sudah Tercapai</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 28px;">task_alt</span>
</button>
<!-- Unselected -->
<button class="touch-target w-full rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-headline-md text-headline-md flex items-center justify-between px-md active:scale-95 transition-all">
<span>Belum Tercapai</span>
<span class="material-symbols-outlined" style="font-size: 28px;">cancel</span>
</button>
</div>
</section>
<!-- Step 5: Kendala -->
<section class="bg-surface-container-lowest rounded-2xl p-md card-shadow flex flex-col gap-md">
<div class="border-b border-surface-variant pb-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">5. Ada kendala?</h2>
</div>
<div class="flex flex-wrap gap-sm">
<!-- Selected Highlighted -->
<button class="touch-target px-5 rounded-xl border-2 border-secondary bg-secondary text-on-secondary font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">thumb_up</span>
                        Tidak Ada
                    </button>
<!-- Unselected Options -->
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
                        Material Kurang
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
                        Hujan
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
                        Pekerja Kurang
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
                        Desain Berubah
                    </button>
<button class="touch-target px-4 rounded-xl border-2 border-outline-variant bg-surface text-on-surface font-label-lg text-label-lg flex items-center gap-2 active:scale-95 transition-all">
                        Lainnya
                    </button>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest rounded-t-2xl px-container-margin py-md shadow-[0_-8px_24px_rgba(27,67,50,0.06)] flex justify-center max-w-md mx-auto right-0">
<button class="touch-target w-full bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                Kirim Laporan
            </button>
</div>
</div>
