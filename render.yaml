services:
  # Backend API
  - type: web
    name: mandorhub-api
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # User harus isi sendiri dari Supabase/Neon
      - key: JWT_SECRET
        generateValue: true
      - key: OTP_DEV_MODE
        value: "false" # Matikan dev mode di production!
      - key: CORS_ORIGINS
        value: "https://mandor.airlangga.online"
